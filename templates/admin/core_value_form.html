{% extends 'admin/base.html' %}
{% block title %}{{ 'Edit' if value else 'New' }} Core Value{% endblock %}
{% block page_title %}{{ 'Edit' if value else 'New' }} Core Value{% endblock %}

{% block content %}
<div class="form-wrap">
  <form method="POST">
    <div class="form-group">
      <label for="title">Title *</label>
      <input type="text" id="title" name="title" value="{{ value.title if value else '' }}" required>
    </div>
    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" name="description">{{ value.description if value else '' }}</textarea>
    </div>
    <div class="form-group">
      <label for="order">Display Order</label>
      <input type="number" id="order" name="order" value="{{ value.order if value else 0 }}">
    </div>
    <div class="form-group">
      <div class="checkbox-group">
        <input type="checkbox" id="is_published" name="is_published" value="1" {{ 'checked' if not value or value.is_published }}>
        <label for="is_published">Published (visible on site)</label>
      </div>
    </div>
    <div style="margin-top:24px;display:flex;gap:10px;">
      <button type="submit" class="btn btn-primary">{{ 'Save Changes' if value else 'Add Core Value' }}</button>
      <a href="{{ url_for('admin.core_values_list') }}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
