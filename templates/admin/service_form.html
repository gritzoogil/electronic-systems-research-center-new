{% extends 'admin/base.html' %}
{% block title %}{{ 'Edit' if service else 'New' }} Service{% endblock %}
{% block page_title %}{{ 'Edit' if service else 'New' }} Service{% endblock %}

{% block content %}
<div class="form-wrap">
  <form method="POST">

    <div class="form-group">
      <label for="name">Service Name *</label>
      <input type="text" id="name" name="name" value="{{ service.name if service else '' }}" required
             placeholder="e.g. PCB Fabrication">
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" name="description" placeholder="Brief description shown to visitors">{{ service.description if service else '' }}</textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="duration_minutes">Duration (minutes) *</label>
        <input type="number" id="duration_minutes" name="duration_minutes" min="15" step="15"
               value="{{ service.duration_minutes if service else 60 }}" required>
      </div>
      <div class="form-group">
        <label for="max_appointments_per_slot">Max Appointments per Slot *</label>
        <input type="number" id="max_appointments_per_slot" name="max_appointments_per_slot" min="1"
               value="{{ service.max_appointments_per_slot if service else 1 }}" required>
        <p class="hint">How many visitors can book the same time slot for this service.</p>
      </div>
    </div>

    <div class="form-group">
      <label for="order">Display Order</label>
      <input type="number" id="order" name="order" value="{{ service.order if service else 0 }}">
    </div>

    <div class="form-group">
      <div class="checkbox-group">
        <input type="checkbox" id="is_published" name="is_published" value="1" {{ 'checked' if not service or service.is_published }}>
        <label for="is_published">Available for booking</label>
      </div>
    </div>

    <div style="margin-top:24px;display:flex;gap:10px;">
      <button type="submit" class="btn btn-primary">{{ 'Save Changes' if service else 'Add Service' }}</button>
      <a href="{{ url_for('admin.services_list') }}" class="btn btn-secondary">Cancel</a>
    </div>

  </form>
</div>
{% endblock %}
