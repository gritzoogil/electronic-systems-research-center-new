<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <title>Change Password — ESRC Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .form-box { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 40px; width: 380px; }
    h1 { font-size: 20px; margin-bottom: 6px; }
    p.sub { font-size: 13px; color: #666; margin-bottom: 24px; }
    label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 6px; margin-top: 14px; }
    label:first-of-type { margin-top: 0; }
    input { width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
    .btn { width: 100%; padding: 10px; background: #0f4c81; color: #fff; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; margin-top: 20px; }
    .btn:hover { background: #0a3560; }
    .btn-secondary { background: #e0e0e0; color: #333; margin-top: 8px; }
    .btn-secondary:hover { background: #ccc; }
    .error { color: #dc2626; font-size: 13px; margin-top: 12px; display: none; }
    .success { color: #166534; font-size: 13px; margin-top: 12px; display: none; }
    a.back-link { display: inline-block; font-size: 12px; color: #666; margin-bottom: 16px; text-decoration: none; }
    a.back-link:hover { color: #0f4c81; }
  </style>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
</head>
<body>
<div class="form-box">
  <a href="{{ url_for('admin.dashboard') }}" class="back-link">← Back to Dashboard</a>
  <h1>Change Password</h1>
  <p class="sub">Enter your current password to confirm it's you, then choose a new one.</p>

  <label for="current_password">Current Password</label>
  <input type="password" id="current_password" placeholder="Current password">

  <label for="new_password">New Password</label>
  <input type="password" id="new_password" placeholder="At least 6 characters">

  <label for="confirm_password">Confirm New Password</label>
  <input type="password" id="confirm_password" placeholder="Repeat new password">

  <button class="btn" onclick="changePassword()">Update Password</button>

  <div id="error-msg" class="error"></div>
  <div id="success-msg" class="success"></div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "{{ firebase_api_key }}",
    authDomain: "{{ firebase_auth_domain }}",
    projectId: "{{ firebase_project_id }}"
  };
  firebase.initializeApp(firebaseConfig);

  async function changePassword() {
    const currentPassword = document.getElementById('current_password').value;
    const newPassword = document.getElementById('new_password').value;
    const confirmPassword = document.getElementById('confirm_password').value;
    const errorDiv = document.getElementById('error-msg');
    const successDiv = document.getElementById('success-msg');
    errorDiv.style.display = 'none';
    successDiv.style.display = 'none';

    if (newPassword.length < 6) {
      errorDiv.textContent = 'New password must be at least 6 characters.';
      errorDiv.style.display = 'block';
      return;
    }
    if (newPassword !== confirmPassword) {
      errorDiv.textContent = 'New passwords do not match.';
      errorDiv.style.display = 'block';
      return;
    }

    const user = firebase.auth().currentUser;
    if (!user) {
      errorDiv.textContent = 'Your session has expired. Please log in again.';
      errorDiv.style.display = 'block';
      setTimeout(() => window.location.href = '{{ url_for("admin.login") }}', 1500);
      return;
    }

    try {
      // Reauthenticate first — Firebase requires a recent login for sensitive actions like password changes
      const credential = firebase.auth.EmailAuthProvider.credential(user.email, currentPassword);
      await user.reauthenticateWithCredential(credential);

      await user.updatePassword(newPassword);

      successDiv.textContent = 'Password updated successfully.';
      successDiv.style.display = 'block';
      document.getElementById('current_password').value = '';
      document.getElementById('new_password').value = '';
      document.getElementById('confirm_password').value = '';
    } catch (err) {
      if (err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') {
        errorDiv.textContent = 'Current password is incorrect.';
      } else if (err.code === 'auth/too-many-requests') {
        errorDiv.textContent = 'Too many attempts. Please try again later.';
      } else {
        errorDiv.textContent = err.message;
      }
      errorDiv.style.display = 'block';
    }
  }
</script>
</body>
</html>
