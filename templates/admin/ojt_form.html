{% extends 'admin/base.html' %}
{% block title %}{{ 'Edit' if intern else 'New' }} OJT Intern{% endblock %}
{% block page_title %}{{ 'Edit' if intern else 'New' }} OJT Intern{% endblock %}

{% block content %}
<div class="form-wrap">
  <form method="POST" enctype="multipart/form-data">

    <div class="form-group">
      <label for="name">Full Name *</label>
      <input type="text" id="name" name="name" value="{{ intern.name if intern else '' }}" required placeholder="Last, First Middle">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" value="{{ intern.email if intern else '' }}" placeholder="23-00000@g.batstate-u.edu.ph">
      </div>
      <div class="form-group">
        <label for="course">Course / Program</label>
        <input type="text" id="course" name="course" value="{{ intern.course if intern else '' }}" placeholder="e.g. BS in Computer Science">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="batch_label">Batch Label</label>
        <input type="text" id="batch_label" name="batch_label" value="{{ intern.batch_label if intern else '' }}" placeholder="e.g. 2025-2026 Midterm Interns">
      </div>
      <div class="form-group">
        <label for="order">Display Order</label>
        <input type="number" id="order" name="order" value="{{ intern.order if intern else 0 }}">
      </div>
    </div>

    <div class="form-group">
      <label for="photo_file">Photo</label>
      <input type="file" id="photo_file" name="photo_file" accept="image/png,image/jpeg,image/webp,image/gif">
      {% if intern and intern.photo_url %}
      <p class="hint" style="margin-top:8px;">Current photo:</p>
      <img src="{{ intern.photo_url }}" style="margin-top:4px;max-width:120px;border-radius:50%;">
      {% endif %}
    </div>

    <div class="form-group">
      <div class="checkbox-group">
        <input type="checkbox" id="is_published" name="is_published" value="1" {{ 'checked' if not intern or intern.is_published }}>
        <label for="is_published">Published (visible on site)</label>
      </div>
    </div>

    <div style="margin-top:24px;display:flex;gap:10px;">
      <button type="submit" class="btn btn-primary">{{ 'Save Changes' if intern else 'Add Intern' }}</button>
      <a href="{{ url_for('admin.ojt_list') }}" class="btn btn-secondary">Cancel</a>
    </div>

  </form>
</div>
{% endblock %}
