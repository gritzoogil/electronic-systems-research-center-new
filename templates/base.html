<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="{% block meta_desc %}Electronic Systems Research Center - Advancing innovation through electronic systems research at Batangas State University The NEU.{% endblock %}"/>
  <meta name="keywords" content="ESRC, Electronic Systems Research Center, BatStateU, Electronics Research, Engineering, IoT, AI, Robotics"/>
  <meta name="author" content="Electronic Systems Research Center"/>
  <meta property="og:title" content="{% block og_title %}Electronic Systems Research Center{% endblock %}"/>
  <meta property="og:type" content="website"/>
  <meta property="og:image" content="{{ url_for('static', filename='img/esrc_logo.png', _external=True) }}"/>
  <title>{% block title %}Electronic Systems Research Center · BatStateU The NEU{% endblock %}</title>

  <!-- Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <!-- Google Fonts: Manrope (display) + Inter (body) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet"/>

  <!-- Design system -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>

  {% block head %}{% endblock %}

  <!-- Structured data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ResearchOrganization",
    "name": "Electronic Systems Research Center",
    "url": "{{ request.host_url }}",
    "memberOf": { "@type": "CollegeOrUniversity", "name": "Batangas State University The National Engineering University" }
  }
  </script>
</head>

<body>
  <a href="#main-content" class="sr-only" style="position:fixed;top:8px;left:8px;z-index:9999;padding:10px 20px;background:var(--navy);color:#fff;border-radius:8px;">Skip to main content</a>

  {% include 'components/nav.html' %}

  <main id="main-content" tabindex="-1">
    {% block content %}{% endblock %}
  </main>

  {% include 'components/footer.html' %}

  <!-- Scroll to top -->
  <button class="scroll-top" id="scrollTop" aria-label="Scroll to top">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="18 15 12 9 6 15"/>
    </svg>
  </button>

  <!-- JS -->
  <script src="{{ url_for('static', filename='js/script.js') }}" defer></script>
  {% block scripts %}{% endblock %}
</body>
</html>
