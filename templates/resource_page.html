{% extends 'base.html' %}
{% block title %}{{ page.title }} — {{ page.resource.title }} — ESRC{% endblock %}

{% block head %}
<style>
  /* Hide the normal footer — full-screen reader mode */
  .site-footer, .circuit-divider { display: none !important; }
  main { display: flex; flex-direction: column; height: 100svh; }

  .reader-topbar {
    height: 52px;
    background: var(--navy-xdark);
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 20px;
    flex-shrink: 0;
    margin-top: 68px; /* nav height */
    border-bottom: 1px solid rgba(255,255,255,.08);
  }
  .reader-back {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: rgba(255,255,255,.6);
    font-size: .82rem;
    font-weight: 600;
    text-decoration: none;
    white-space: nowrap;
    transition: color .2s;
    flex-shrink: 0;
  }
  .reader-back:hover { color: var(--white); }
  .reader-back svg { width: 13px; height: 13px; }
  .reader-title {
    font-family: var(--font-d);
    font-size: .88rem;
    font-weight: 700;
    font-style: normal;
    color: var(--white);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
  }
  .reader-sep {
    color: rgba(255,255,255,.2);
    flex-shrink: 0;
  }
  .reader-chapter {
    font-size: .78rem;
    color: var(--cyan);
    font-weight: 600;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .reader-iframe {
    flex: 1;
    border: 0;
    width: 100%;
    min-height: 0;
    display: block;
    background: var(--gray-100);
  }
</style>
{% endblock %}

{% block content %}
<div class="reader-topbar">
  <a href="{{ url_for('public.resource_detail', resource_id=page.resource_id) }}"
     class="reader-back">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
    {{ page.resource.title }}
  </a>
  <span class="reader-sep" aria-hidden="true">/</span>
  <span class="reader-chapter">{{ page.title }}</span>
</div>

<iframe class="reader-iframe"
        src="{{ page.embed_url }}"
        allowfullscreen
        title="{{ page.title }}">
</iframe>
{% endblock %}
