{% extends 'base.html' %}
{% block title %}{{ page.title }} — ESRC{% endblock %}

{% block content %}
<section style="padding-top:100px;">
  <div style="padding:0 20px 10px;">
    <a href="{{ url_for('public.resource_detail', resource_id=page.resource_id) }}" style="font-weight:600;color:var(--navy);text-decoration:none;">
      ← Back to {{ page.resource.title }}
    </a>
  </div>
  <iframe allowfullscreen scrolling="no"
    style="border:0;width:100%;height:90vh;"
    src="{{ page.embed_url }}">
  </iframe>
</section>
{% endblock %}
